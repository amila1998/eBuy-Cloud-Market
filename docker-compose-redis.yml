services:
  redis-stack:
    image: redis/redis-stack:latest
    container_name: redis-stack
    ports:
      - "6379:6379"      # Redis port
      - "8001:8001"      # RedisInsight port (web UI)
    environment:
      - REDIS_ARGS=--requirepass yourpassword --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - redis-network

volumes:
  redis-data:

networks:
  redis-network:
    driver: bridge
